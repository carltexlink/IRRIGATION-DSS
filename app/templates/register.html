{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-body p-4">
                <h4 class="mb-4 text-success fw-bold">Create Account</h4>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select name="role" class="form-select" id="role-select" required>
                            <option value="farmer">Farmer</option>
                            <option value="seller">Seller</option>
                        </select>
                    </div>

                    <!-- Extra fields shown only for sellers -->
                    <div id="seller-fields" style="display:none">
                        <hr>
                        <p class="text-muted small">Business details — will be reviewed by admin before activation.</p>
                        <div class="mb-3">
                            <label class="form-label">Business Name</label>
                            <input type="text" name="business_name" class="form-control" placeholder="e.g. Amiran Kenya Ltd">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Business Phone</label>
                            <input type="text" name="phone" class="form-control" placeholder="e.g. +254 722 000 000">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control" placeholder="e.g. Nairobi, Kenya">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
                <p class="mt-3 text-center">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    const roleSelect = document.getElementById('role-select');
    const sellerFields = document.getElementById('seller-fields');
    roleSelect.addEventListener('change', function() {
        sellerFields.style.display = this.value === 'seller' ? 'block' : 'none';
    });
</script>
{% endblock %}
